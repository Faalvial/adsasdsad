services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: control_asistencia
      POSTGRES_USER: asistencia_user
      POSTGRES_PASSWORD: admin123
      TZ: America/Lima  # <-- ZONA HORARIA AÑADIDA
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=control_asistencia
      - DB_USER=asistencia_user
      - DB_PASSWORD=admin123
      - TZ=America/Lima  # <-- ZONA HORARIA AÑADIDA
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Lee VITE_API_URL desde el archivo .env principal, o usa localhost:8000 por defecto
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  pgdata: